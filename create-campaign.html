<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supportify - Create Campaign</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header>
    <div class="logo">Supportify</div>
    <nav id="main-nav"></nav>
  </header>

  <main class="create-campaign-main">
    <div class="form-container">
      <h2>Start a Campaign</h2>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="title" placeholder="Campaign title" />
        <span class="field-error" id="title-error"></span>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Describe your campaign"></textarea>
        <span class="field-error" id="description-error"></span>
      </div>

      <div class="form-group">
        <label>Goal ($)</label>
        <input type="number" id="goal" placeholder="Fundraising goal" min="1" />
        <span class="field-error" id="goal-error"></span>
      </div>

      <div class="form-group">
        <label for="deadline">Deadline</label>
        <input type="date" id="deadline" aria-label="Campaign deadline date" />
        <span class="field-error" id="deadline-error"></span>
      </div>

      <div class="form-group">
        <label for="image">Image</label>
        <input type="file" id="image" accept="image/*" />
      </div>

      <button class="btn btn-green" id="create-btn">Create Campaign</button>
      <div id="general-error"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 Supportify. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/create-campaign.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
