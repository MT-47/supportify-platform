<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supportify - Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header>
    <div class="logo">Supportify</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="form-container">
      <h2>Register</h2>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
        <span class="field-error" id="name-error"></span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <span class="field-error" id="email-error"></span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
        <span class="field-error" id="password-error"></span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm your password" />
        <span class="field-error" id="confirm-error"></span>
      </div>

      <button class="btn btn-green" id="register-btn">Register</button>
      <span class="field-error" id="general-error"></span>

      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>

  <footer>
    <p>© 2026 Supportify. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/register.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
