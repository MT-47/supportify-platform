<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supportify - Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header>
    <div class="logo">Supportify</div>
    <nav id="main-nav"></nav>
  </header>

  <main class="dashboard-main">
    <h2 id="welcome-msg"></h2>

    <section id="my-campaigns-section">
      <h3>My Campaigns</h3>
      <div id="my-campaigns-container"></div>
    </section>

    <section id="my-pledges-section">
      <h3>My Pledges</h3>
      <div id="my-pledges-container"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Supportify. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <p id="modal-message">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-yes" class="btn btn-red">Delete</button>
        <button id="confirm-no" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-box modal-box-large">
      <h3 class="modal-title">Edit Campaign</h3>

      <div class="form-group">
        <label for="edit-title">Title</label>
        <input type="text" id="edit-title" placeholder="Enter campaign title" />
        <span class="field-error" id="edit-title-error"></span>
      </div>

      <div class="form-group">
        <label for="edit-description">Description</label>
        <textarea id="edit-description" placeholder="Enter campaign description"></textarea>
        <span class="field-error" id="edit-description-error"></span>
      </div>

      <div class="form-group">
        <label for="edit-goal">Goal ($)</label>
        <input type="number" id="edit-goal" min="1" placeholder="Enter funding goal" />
        <span class="field-error" id="edit-goal-error"></span>
      </div>

      <div class="form-group">
        <label for="edit-deadline">Deadline</label>
        <input type="date" id="edit-deadline" />
        <span class="field-error" id="edit-deadline-error"></span>
      </div>

      <div class="form-group">
        <label for="edit-image">Image</label>
        <input type="file" id="edit-image" accept="image/*" />
      </div>

      <div class="modal-actions">
        <button id="edit-save" class="btn btn-green">Save Changes</button>
        <button id="edit-cancel" class="btn btn-red">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/userDashboard.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
