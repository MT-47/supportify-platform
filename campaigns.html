<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supportify - Campaign</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header>
    <div class="logo">Supportify</div>
    <nav id="main-nav"></nav>
  </header>

  <main class="campaign-detail-main">
    <div id="campaign-details"></div>

    <section id="pledge-section">
      <h3>Support this Campaign</h3>
      <div id="pledge-msg"></div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" id="pledge-amount" placeholder="Enter amount" min="1" />
      </div>
      <button class="btn btn-green" id="pledge-btn">Pledge Now</button>
    </section>

    <section id="pledges-list">
      <h3>Recent Pledges</h3>
      <div id="pledges-container"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Supportify. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <p id="modal-message">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-yes" class="btn btn-green">Confirm</button>
        <button id="confirm-no" class="btn btn-red">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/campaigns.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
