<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supportify - Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin-enhancements.css" />
</head>

<body>

  <header>
    <div class="logo">Supportify</div>
    <nav>
      <span id="admin-name"></span>
      <button id="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="admin-main">
    <h2 id="welcome-msg">Admin Dashboard</h2>

    <section id="users-section">
      <h3>All Users</h3>
      <div id="users-container"></div>
    </section>

    <section id="campaigns-section">
      <h3>All Campaigns</h3>
      <div id="campaigns-container"></div>
    </section>
  </main>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <p id="modal-message">Are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-yes" class="btn btn-red">Delete</button>
        <button id="confirm-no" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 Supportify. All rights reserved to Mustafa Taher - .Net ITI Zagazig.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/adminDashboard.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
